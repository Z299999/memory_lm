# Exp0406 LLM Distillation Configuration

teacher:
  model: "qwen3.5-plus"
  api_key_env: "DASHSCOPE_API_KEY"
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  temperature: 0.2
  max_tokens: 2048

student:
  model: "Qwen/Qwen2.5-0.5B-Instruct"
  max_length: 1024
  load_in_8bit: false

data:
  datasets:
    - name: "gsm8k"
      subset: "main"
      split: "train"
      num_samples: 2000
  save_dir: "data/generated"
  test_split_ratio: 0.1

train:
  output_dir: "models/student"
  batch_size: 16
  learning_rate: 5e-5
  num_epochs: 5
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  save_steps: 200
  logging_steps: 50
  seed: 42
  fp16: true

eval:
  batch_size: 8
  metrics:
    - "accuracy"
    - "exact_match"
