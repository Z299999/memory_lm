# Simplex Memory Network Configuration

# Model type: "smn" or "mlp"
model_type: smn

# Experiment name (used in run folder name)
run_name: exp0414_smn

# SMN architecture parameters
n: 5            # Simplex dimension (2 = triangle, 3 = tetrahedron)
m: 3            # Resolution (each edge has m lattice points)
n_in: 1         # Input dimension
n_out: 1        # Output dimension

# MLP baseline architecture (used when model_type: mlp)
mlp_layers: [8, 8, 8]

# Activation function: "relu", "leaky_relu", "gelu", "tanh"
node_activation: gelu

# Task: "sin", "sin_mix", "poly_wave", "piecewise" (1D)
#       "sin_sum", "sin_product", "quadratic" (2D)
task_name: sin_mix
custom_function: ""  # For custom tasks (eval-based, use with care)

# Training parameters
lr: 0.001
batch_size: 64
epochs: 1000

# Moving window training (set window_width > 0 to enable)
# Window slides from left to right without cycling
# Each window position trains for `window_hold` epochs before sliding
# Note: Window training may result in higher val_loss as model learns
# sequentially and may experience catastrophic forgetting
window_width: 0.05   # 0.0 = disabled, 0.05 = 5% of 200π domain
window_hold: 20      # epochs per window position

# Data range (for 1D tasks)
# Extended range: 0 to 200π (about 100 periods of sin)
x_min: 0.0
x_max: 628.3185307179587  # 200π
