# This is the main file you should edit before running `python3 run.py`.
# You usually do not need to touch the Python code for normal experiments.

# Name of the experiment folder under exp0410_triangleNet/runs/.
# If you leave it as "default", run.py will use task_name as the folder name.
run_name: default

# Triangle side length.
# L = 3 means the baby case triangle:
#   1 node on top
#   2 nodes in the middle
#   3 nodes on the bottom
L: 7

# depth = number of neurons at each position
# int: same depth for all layers (e.g., depth=1 means 1 neuron per position)
# "tetrahedron": depth(z) = z, forms a tetrahedron (L(L+1)(L+2)/6 nodes)
depth: tetrahedron

# Cross-layer connection mode.
# shared_x: (x,y,z)->(x,y,z+1) connects same x only
# full_x:   all source x connect to all target x (more connections)
cross_layer_mode: full_x

# Number of input nodes.
# n_in=1: 1D functions (input is scalar)
# n_in=2: 2D functions (input is 2D vector, visualized as heatmap)
n_in: 2

# Number of output nodes.
# n_out=1: single output (scalar regression)
# n_out>1: multi-output (vector regression, each output learns independently)
# For multi-output, each output dimension is a different frequency combination of the base function.
n_out: 2

# MLP baseline structure.
# [8, 8, 8] means 3 hidden layers and each hidden layer has 8 nodes.
# Other examples:
#   [16]
#   [16, 16]
#   [16, 32, 16]
mlp_layers: [8, 24, 24, 8]

# Built-in target function name.
#
# 1D functions (n_in=1):
#   sin         - Simple sine wave: sin(x)
#   sin_mix     - Mixed sine waves: 0.6*sin(x) + 0.3*sin(3x+0.4) + 0.1*cos(5x)
#   poly_wave   - Polynomial + sine: 0.15*x^3/10 + 0.6*sin(2x)
#   piecewise   - Piecewise: linear-sine-linear (3 segments)
#
# 2D functions (n_in=2):
#   sin2d        - Sine-cosine product: sin(x1)*cos(x2)
#                  Multi-output: freq scales by (i+1) → dim2 is sin(2x1)*cos(2x2)
#   distance2d   - Radial sine wave: sin(sqrt(x1^2 + x2^2))
#                  Multi-output: freq scales by (i+1) → dim2 has 2x frequency rings
#   saddle2d     - Saddle surface: (x1^2 - x2^2) / 10
#                  Multi-output: scale scales by (i+1) → dim2 is 2x steeper
#   peakvalley2d - Two Gaussian peaks: exp(-(x1^2+x2^2)) - 0.5*exp(-((x1-1)^2+(x2+1)^2))
#                  Multi-output: peak positions shift by offset=i*0.5
#   mix2d        - Mixed frequencies: 0.5*sin(2x1) + 0.3*sin(5x2) + 0.2*cos(3(x1+x2))
#                  Multi-output: all freqs scale by (i+1) → dim2 has 2x frequencies
#
# Recommended 2in2out tasks (n_in=2, n_out=2):
#   sin2d        - Good starting point, moderate difficulty
#   distance2d   - Tests radial symmetry learning
#   mix2d        - Most challenging, multiple frequency components
task_name: mix2d

# Optional custom target function.
# If this is not empty, it overrides task_name.
# The expression must use torch syntax and variable x.
# Example:
#   "torch.sin(2*x) + 0.2*torch.cos(7*x)"
custom_function: ""

# Activation used inside TMN node blocks.
# Options: relu, leaky_relu, gelu, tanh
node_activation: relu

# Final output activation.
# Current code uses tanh, so the easiest target functions are those whose values are roughly in [-1, 1].
output_activation: tanh

# Learning rate for Adam optimizer.
# If training is unstable, try smaller values like 0.0005.
lr: 0.001

# Batch size for training.
# Larger batch is smoother but uses more memory.
batch_size: 64

# Number of training epochs.
# Increase this if the function fit is still poor.
epochs: 10000

# Input x range.
# Training samples are drawn uniformly from [x_min, x_max].
x_min: -6.283185307179586
x_max: 6.283185307179586
