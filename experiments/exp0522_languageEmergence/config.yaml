run:
  run_name: exp0522_clock_v0   # run folder suffix
  seed: 42                     # random seed for model init and fixed language readout
  log_every: 100                # print training status every N epochs
  output_root: runs            # where timestamped run folders are created
  train_baseline: false        # whether to train the no-language baseline model for this run
  eval_mute_deaf: true         # whether to run full-model mute-deaf evaluation

model:
  trunk_dims:
    - 32                       # hidden width of the MLP trunk
    # - 32
    # - 32
  activation: tanh             # hidden activation: tanh, relu, or leaky_relu
  language_dim: 8              # number of language input/output heads
  language_readout_coverage: 3  # average number of language heads that read each hidden node; try 2 or 3 for redundancy

task:
  cycle_steps: 32               # number of steps in one full target cycle
  pulse_value: 1.0              # constant ordinary input x_t at every step
  target_kind: mixed_sin        # target waveform: sine or mixed_sin
  mixed_sin_components:         # list of [freq_multiplier, amplitude] pairs; only used when target_kind is mixed_sin
    - [2, 1.0]                  # 2rd harmonic : sin(2phi_t)
    - [3, 0.5]                  # 3rd harmonic (coprime with 2): sin(3*phi_t)

train:
  epochs: 5000                  # total training epochs
  lr: 0.003                    # Adam learning rate
  weight_decay: 0.0            # L2 regularization
  grad_clip: 1.0               # gradient clipping threshold
  sequence_mode: continuous_window         # reset or continuous_window message handling between training windows
  # sequence_mode: reset         # reset or continuous_window message handling between training windows
  fixed_train_steps: 40        # rollout length used for every training episode/window
  train_phase_mode: continuous      # reset or continuous phase progression during training
  # train_phase_mode: reset      # reset or continuous phase progression during training
  message_aux_loss_weight: 1.0  # weight for the 1-step future-prediction aux loss on final message (0 = disabled)
  message_refresh: true         # after each optimizer step, re-run 1 no-grad forward step from m[-2] to freshen the carried message

eval:
  eval_steps: 128              # in-distribution evaluation rollout length
  long_steps: 512              # long-horizon rollout length for stress test
  continuous_eval_steps: 512   # measured length of the continuous-stream evaluation
  eval_phase_mode: both        # which evals to write: reset, continuous, or both

plot:
  plot_dpi: 160                # dpi for saved plots
  plot_training_fig_width: 8.0 # width of training_curves.png
  plot_training_fig_height: 5.0 # height of training_curves.png
  plot_diag_fig_width: 12.0    # width of rollout_diagnostics.png
  plot_diag_fig_height: 15.0   # height of rollout_diagnostics.png
  plot_short_steps: 128        # number of short-rollout steps shown in the diagnostics figure
  plot_long_steps: 512         # number of long-rollout steps shown in the diagnostics figure
  plot_error_steps: 128        # number of steps shown in the short-rollout error panel
  plot_message_steps: 128      # number of steps shown for message traces and message norm
  plot_grid_alpha: 0.25        # grid transparency used in plots
  plot_title_fontsize: 14      # title fontsize for the combined diagnostics figure
  plot_target_color: "#8a8a8a" # target trajectory color
  plot_target_linestyle: "--"  # target trajectory linestyle
  plot_target_linewidth: 1.0   # line width for the target trajectory
  plot_series_linewidth: 1.7   # main line width for the full model curves
  plot_aux_linewidth: 1.5      # auxiliary line width for baseline, mute-deaf, and message traces
  plot_zero_linewidth: 1.0     # line width for the zero-error reference line
  plot_prediction_legend_ncols: 4 # legend columns for rollout panels
  plot_error_legend_ncols: 3   # legend columns for the error panel
  plot_message_legend_ncols: 2 # legend columns for message traces
  plot_training_series: [full_train, full_val] # which curves appear in training_curves.png
  plot_rollout_series: [target, full] # which curves appear in short and long rollout panels
  plot_error_series: [full] # which model errors appear in the short-rollout error panel
  # plot_training_series: [full_train, full_val, baseline_train, baseline_val] # which curves appear in training_curves.png
  # plot_rollout_series: [target, full, baseline, mute_deaf] # which curves appear in short and long rollout panels
  # plot_error_series: [full, baseline, mute_deaf] # which model errors appear in the short-rollout error panel
  plot_show_message_traces: true # whether to show the per-channel message traces panel
  plot_show_message_norm: true  # whether to show the message-norm panel
