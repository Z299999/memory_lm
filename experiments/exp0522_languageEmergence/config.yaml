run:
  run_name: exp0522_single_agent_mainline  # run folder suffix
  seed: 42                     # random seed for model init and fixed language readout
  log_every: 25               # print training status every N epochs
  output_root: runs            # where timestamped run folders are created

model:
  trunk_dims: "[37]*11"    # hidden width of the MLP trunk
  activation: tanh             # hidden activation: tanh, relu, or leaky_relu
  language_dim: 53              # number of language input/output heads; set to 0 for the no-language control
  language_readout_coverage: 3  # average number of language heads that read each hidden node; try 2 or 3 for redundancy
  use_error_input: true        # whether the primary model receives the previous prediction error as a separate input node
  use_residual: true           # skip connections on hidden→hidden layers with matching dims (ignored when use_dense is true)
  use_dense: true             # DenseNet trunk: each layer receives concat of all previous layer outputs
  language_readout_all_layers: true  # if true, readout node pool = all hidden layers (concat); false = last layer only
  language_readout_trainable: true  # true = R is nn.Parameter; gradient shapes which layer each head reads from
  readout_nonlinearity: tanh        # activation after readout projection: none | tanh
  message_carry_mode: identity       # identity | learnable_diagonal | learnable_matrix
  use_pipeline: true                # true = GNN-style pipeline: each edge propagates one layer per step

task:
  cycle_steps: 32               # number of steps in one full target cycle
  pulse_value: 1.0              # constant ordinary input x_t at every step
  target_kind: mixed_sin        # target waveform: sine or mixed_sin
  prediction_target: y          # supervised target space: y | v | a (legacy aliases velocity/acceleration also work)
  mixed_sin_components:         # list of [freq_multiplier, amplitude] pairs; only used when target_kind is mixed_sin
    # - [0.0013, 1]
    # - [0.004, 2.1]
    # - [0.01, 1]
    # - [0.0005, 2]
    # - [0.029, 1.5]
    - [0.05, 3]
    - [0.7, 2]
    - [1, 1.0]
    - [2, 0.5]
    # - [3, 0.25]
    # - [5, 0.125]
    # - [7, 0.1]
    # - [31, 0.5]
    # - [79, 0.5]
    

train:
  epochs: 10000000                # total training epochs
  lr: 0.0001                  # Adam learning rate
  weight_decay: 0.0            # L2 regularization
  grad_clip: 1.0               # gradient clipping threshold
  sequence_mode: continuous_window         # reset or continuous_window message handling between training windows
  train_window_schedule: event_triggered(2.00,10,10000) # rollout length: fixed(32) | random_uniform(5,50) | event_triggered(threshold,min,max), e.g. event_triggered(0.02,10,2000)
  error_degrade: tail_dim(2000, 5000, 0)          # training-time error dimming
  early_stop_min_steps: 5000    # stop training if any window reaches this many steps (null = off): none | dim(rate,min,max,pct,ramp), e.g. dim(0.3,20,80,5,10) | tail_dim(start,end,min_pct), e.g. tail_dim(200,2000,5)
  train_phase_mode: continuous      # reset or continuous phase progression during training
  message_aux_loss_weight: 0.1  # weight for the 1-step future-prediction aux loss on final message (0 = disabled)
  detach_error_input: true     # whether e_t is detached before being fed into the next step
  carry_error_between_windows: true # in continuous_window mode, carry the final detached error into the next window
  force_zero_error_input: false # if true, keep the [1,e,m] interface but force e=0 at every step as a zero-error ablation
  train_loss_tail_steps: null   # null = all steps; integer N = only last N steps of each window contribute to loss (window termination unaffected)
  train_loss_space: y           # raw | y; space for loss AND event_triggered cutoff SSE. y = MSE on reconstructed position (note: switching to y rescales the event_triggered threshold)
  language_readout_norm_penalty: 0.0  # column-norm regularization for trainable readout; penalizes (||col||_2 - 1)^2

eval:
  eval_steps: 200              # in-distribution evaluation rollout length
  long_steps: 500              # long-horizon rollout length for stress test
  continuous_eval_steps: 512   # measured length of the continuous-stream evaluation
  eval_phase_mode: both        # which evals to run and plot: reset | continuous | both
  # ablation conditions: full | sole_eye | sole_speech | neither
  #                      late_blind(N) | late_mute(N) | blink(start,end) | dim(start,ramp_end,end,pct) | stutter(start,end)
  eval_conditions: [full, "dim(40,140,200,5)"]

analysis:
  enable_continuous_collapse: true   # whether to save milestone full-model checkpoints for offline collapse analysis
  checkpoint_every: 100   # save checkpoint every N epochs (null = off)

plot:
  plot_dpi: 200                # dpi for saved plots
  plot_training_fig_width: 12.0 # width of training_curves.png
  plot_training_fig_height: 7.0 # height of training_curves.png
  plot_diag_fig_width: 16.0    # width of eval_rollout_diagnostics.png
  plot_diag_fig_height: 15.0   # height of eval_rollout_diagnostics.png
  plot_short_steps: 128        # number of short-rollout steps shown in the diagnostics figure
  plot_long_steps: 512         # number of long-rollout steps shown in the diagnostics figure
  plot_error_steps: 128        # number of steps shown in the short-horizon error panel
  plot_message_steps: 128      # number of steps shown in short-horizon message panels
  plot_grid_alpha: 0.25        # grid transparency used in plots
  plot_title_fontsize: 14      # title fontsize for the combined diagnostics figure
  plot_target_color: "#8a8a8a" # target trajectory color
  plot_target_linestyle: "--"  # target trajectory linestyle
  plot_target_linewidth: 1.0   # line width for the target trajectory
  plot_series_linewidth: 1.7   # main line width for the full model curves
  plot_aux_linewidth: 1.5      # auxiliary line width for baseline, mute-deaf, and message traces
  plot_zero_linewidth: 1.0     # line width for the zero-error reference line
  plot_prediction_legend_ncols: 4 # legend columns for rollout panels
  plot_error_legend_ncols: 3   # legend columns for the error panel
  plot_message_legend_ncols: 2 # legend columns for message traces
  plot_training_series: [full_train, full_val]
  plot_show_message_traces: true # whether to show the per-channel message traces panel
  plot_show_message_norm: true  # whether to show the message-norm panel
  plot_rollout_top_mode: match_train # top rollout panels: match_train | match_eval | all_available
  plot_aux_horizon: long        # auxiliary rollout panels: short | long | both
  plot_show_training_timeline: true # whether to generate training_timeline.png for continuous_window runs
  plot_training_timeline_num_panels: 30 # number of evenly sampled local windows shown in the training timeline figure
  plot_training_timeline_ncols: 5      # number of columns in the training timeline grid
  plot_training_timeline_window_steps: 200 # number of global time steps shown inside each training timeline panel
  plot_training_timeline_fig_width: 27.0   # width of training_timeline.png (independent of training_curves width)
  plot_training_timeline_shared_ylim: false  # if true, all timeline panels share the same y-axis range
  plot_training_timeline_ylim: null         # null = auto (shared_ylim logic); or [ymin, ymax] to pin the range, e.g. [-2.0, 2.0]
