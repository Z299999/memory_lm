# PPO on CustomCartPole

# === 环境 ===
env_name: "CartPole-v1"
max_steps: 500
use_custom_env: true

# === 奖励惩罚系数（与 exp0422 一致）===
pos_weight: 0.1           # 小车位置   (x)
vel_weight: 0.3           # 小车速度   (ẋ)
angle_weight: 1.0         # 杆角度     (θ)
angvel_weight: 0.1        # 杆角速度   (θ̇)
acc_weight: 0.01          # 水平加速度 (ẍ)
angacc_weight: 0.01       # 角加速度   (θ̈)

# === 网络结构 ===
hidden_layers: [64, 64]   # Actor 和 Critic 共用同一组隐藏层尺寸

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95          # GAE λ，平衡 bias/variance
clip_eps: 0.2             # surrogate clipping range
value_coef: 0.5           # critic loss 权重
entropy_coef: 0.01        # 熵奖励系数，鼓励探索
n_steps: 2048             # 每次 rollout 收集的步数
n_epochs: 10              # 每批数据训练几轮
batch_size: 64            # minibatch 大小

# === 训练 ===
continuous_action: true  # true = Gaussian policy F∈[-10,10], false = Categorical(21)
num_updates: 200          # 总更新次数（总步数 = num_updates × n_steps = 409600）
print_every: 10           # 每 N 次 update 打印一次
num_seeds: 1
render: true              # 训练后弹窗演示并保存 GIF
