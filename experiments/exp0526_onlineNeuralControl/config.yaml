run:
  run_name: exp0526_scalar_control_affine_v1  # run folder suffix under output_root/YYYYMMDD/
  seed: 42                            # random seed for model init and fixed language readout
  log_every: 100                      # print training/eval status every N updates
  output_root: runs                   # where timestamped run folders are created

model:
  trunk_dims: [64, 64]                # hidden widths of the feed-forward controller trunk
  activation: tanh                    # hidden activation: tanh, relu, or leaky_relu
  language_dim: 7                    # number of self-talk channels; set 0 for the no-language control
  language_readout_coverage: 2        # average number of language heads reading each hidden node
  use_residual: true                  # skip connections on hidden->hidden layers with matching dims
  language_readout_all_layers: true   # if true, message readout samples from all hidden layers concatenated
  message_carry_mode: identity  # identity | learnable_diagonal | learnable_matrix

env:
  # Available env kinds:
  #   scalar_control_affine : 1D system x_dot = f(x) + g(x) u
  #   scalar_cubic          : 1D compatibility wrapper x_dot = a x + b x^3 + c u
  #   planar_double_well    : 2D system
  #                           x1_dot = x2
  #                           x2_dot = alpha*x1 - beta*x1^3 - gamma*x2 + control_gain*u
  #
  # Mainline default below is now the 2D planar_double_well system.
  # If you ever want to temporarily switch back to 1D, use the commented
  # scalar template at the end of this block.
  env_kind: planar_double_well        # current default: 2D double-well benchmark
  dt: 0.01                            # Euler step size
  x0: [0.2, 0.0]                      # 2D initial state [x1, x2]
  pulse_value: 1.0                    # constant pulse appended to observation [x, pulse]
  u_max: 1.5                          # bounded symmetric control scale, applied as u_max * tanh(raw_u)
  f_expr: x - x**3                    # 1D only: drift term f(x) for scalar_control_affine
  g_expr: x+2                         # 1D only: control field g(x) for scalar_control_affine
  linear_coeff: 1.0                   # 1D only: linear drift coefficient in x_dot = a x + b x^3 + c u
  cubic_coeff: 1.0                    # 1D only: cubic drift coefficient for scalar_cubic
  control_gain: 1.0                   # control coupling coefficient
  alpha: 1.0                          # 2D only: double-well linear coefficient
  beta: 1.0                           # 2D only: double-well cubic coefficient; with alpha>0 gives outer stable points
  gamma: 0.4                          # 2D only: damping coefficient
  state_limit: 6.0                    # soft tanh saturation to keep early continuous exploration finite

  # -------- 1D scalar_control_affine template --------
  # env_kind: scalar_control_affine
  # dt: 0.005
  # x0: 0.5
  # pulse_value: 1.0
  # u_max: 2.0
  # f_expr: x - x**3
  # g_expr: x+2
  # control_gain: 1.0
  # state_limit: 4.0

train:
  epochs: 10000                        # number of continuous-window optimizer updates
  lr: 0.0001                          # Adam learning rate
  weight_decay: 0.0                   # L2 regularization for Adam
  grad_clip: 1.0                      # gradient clipping threshold; <=0 disables clipping
  train_window_schedule: random_uniform(10, 30)  # rollout length rule: fixed(L) or random_uniform(a,b)
  control_loss_weight: 0.001         # penalty on mean u^2 to discourage excessive control

eval:
  eval_steps: 64                      # short validation rollout length used during training logs
  future_steps: 256                   # held-out future rollout length after training stops
  # ablation conditions: full | sole_eye | sole_speech | neither | blink(start,end) | stutter(start,end)
  eval_conditions: [full]
  # eval_conditions: [full, blink(20, 40), stutter(80, 120)]

plot:
  plot_dpi: 160
  plot_training_fig_width: 10.0
  plot_training_fig_height: 6.0
  plot_diag_fig_width: 16.0
  plot_diag_fig_height: 12.0
  plot_grid_alpha: 0.25
  plot_title_fontsize: 14
  plot_series_linewidth: 1.7
  plot_aux_linewidth: 1.4
  plot_zero_linewidth: 1.0
  plot_legend_ncols: 4
  plot_show_message_traces: true
  plot_show_message_norm: true
  plot_show_training_timeline: true
  plot_training_timeline_num_panels: 20
  plot_training_timeline_ncols: 5
  plot_training_timeline_window_steps: 120
  plot_training_timeline_fig_width: 24.0
