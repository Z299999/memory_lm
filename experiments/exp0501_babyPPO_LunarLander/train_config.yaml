# ppoTrain.py — 训练配置

# === 环境 ===
env_name: "LunarLander-v3"
max_steps: 1000
map_scale: 1.0           # 训练地图：1=原始(20×13m), 2=两倍, 3=三倍
continuous: true
use_ballistic: true
entry_speed: 5.0
entry_angle_deg: 45.0
random_side: true

# === 网络结构 ===
hidden_layers: [64, 64]

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
value_coef: 0.5
entropy_coef: 0.01
n_steps: 2048
n_epochs: 10
batch_size: 64

# === 训练 ===
resume: false
num_updates: 500
print_every: 10
num_seeds: 1
solved_threshold: 200
