# ppoTrain.py — 训练配置

# === 环境 ===
env_name: "LunarLander-v3"
max_steps: 1000
map_scale: 2.0           # 训练地图：1=原始(20×13m), 2=两倍, 3=三倍
continuous: true
use_ballistic: true
entry_speed: 5.0
entry_angle_deg: 45.0
random_side: true
angle_tilt_factor: 0.3   # 初始倾斜系数（相对弹道方向角度）
init_angvel: 0.0          # 初始角速度 (rad/s)
init_height_m: null       # 距着陆垫高度(m)，null = 视口顶部
init_x_offset_m: 0.0     # 偏离中心水平距离(m)，正=右，负=左

# === 网络结构 ===
hidden_layers: [64, 64]

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
value_coef: 0.5
entropy_coef: 0.01
n_steps: 2048
n_epochs: 10
batch_size: 64

# === 训练 ===
resume: true
num_updates: 500
print_every: 10
num_seeds: 1
solved_threshold: 200
