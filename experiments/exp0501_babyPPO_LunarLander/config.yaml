# babyPPO — LunarLander-v3（连续动作 + 物理驱动奖励）

# === 环境 ===
env_name: "LunarLander-v3"
max_steps: 1000

# === 连续动作 ===
continuous: true             # LunarLanderContinuous：action = [main, lateral] ∈ [-1,1]

# === 弹道入射 ===
use_ballistic: true
entry_speed: 5.0
entry_angle_deg: 45.0
random_side: true

# === 奖励函数 ===
# 距离 shaping（差分）+ 腿触地 + 燃料（−0.3/−0.03）+ 终止±100
# 去掉了速度惩罚和角度惩罚（弹道入射不适用）

# === 网络结构 ===
hidden_layers: [64, 64]

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
value_coef: 0.5
entropy_coef: 0.01

n_steps: 2048
n_epochs: 10
batch_size: 64

# === 训练 ===
resume: true            # 新奖励函数，不兼容旧 checkpoint，从头训练
num_updates: 500
print_every: 10
num_seeds: 1
render: true
solved_threshold: 200
