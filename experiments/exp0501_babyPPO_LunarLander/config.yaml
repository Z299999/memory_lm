# babyPPO — LunarLander-v3（连续动作 + 物理驱动奖励）

# === 环境 ===
env_name: "LunarLander-v3"
max_steps: 1000

# === 连续动作 ===
continuous: true             # LunarLanderContinuous：action = [main, lateral] ∈ [-1,1]

# === 弹道入射 ===
use_ballistic: true
entry_speed: 5.0
entry_angle_deg: 45.0
random_side: true

# === 奖励权重（物理驱动）===
w_neg_g:    0.05    # 负g惩罚（血涌向头，较重）
w_pos_g:    0.01    # 正g惩罚（压向脚底，较轻）
w_angacc:   0.005   # 角加速度惩罚（结构载荷）
w_land_pos: 50.0    # 落地偏差惩罚（归一化后）
w_land_vel: 2.0     # 落地速度惩罚
w_legs:     10.0    # 每条腿触地奖励
w_fallback: 200.0   # 无法预测落地时的惩罚（飞船在上升）
w_main:     0.3     # 主引擎燃料惩罚（每步）
w_side:     0.03    # 侧引擎燃料惩罚（每步）

# === 网络结构 ===
hidden_layers: [64, 64]

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
value_coef: 0.5
entropy_coef: 0.01

n_steps: 2048
n_epochs: 10
batch_size: 64

# === 训练 ===
resume: false            # 新奖励函数，不兼容旧 checkpoint，从头训练
num_updates: 500
print_every: 10
num_seeds: 1
render: true
solved_threshold: 200
