# babyPPO — LunarLander-v3 (discrete, 4 actions)

# === 环境 ===
env_name: "LunarLander-v3"
max_steps: 1000              # LunarLander episodes can run up to 1000 steps

# === 弹道入射（可选）===
use_ballistic: false         # true = 飞船以弹道轨迹飞入，而非静止悬浮
entry_speed: 5.0             # 初始速度大小（物理单位）
entry_angle_deg: 45.0        # 速度方向与水平面的夹角（向下）
random_side: true            # true = 随机从左/右飞入

# === 网络结构 ===
hidden_layers: [64, 64]

# === PPO 超参数 ===
lr: 3.0e-4
gamma: 0.99
gae_lambda: 0.95             # GAE λ
clip_eps: 0.2                # surrogate clipping range
value_coef: 0.5              # critic loss 权重
entropy_coef: 0.01           # 熵奖励，鼓励探索

n_steps: 2048                # 每次 rollout 收集的步数
n_epochs: 10                 # 每批数据训练几轮
batch_size: 64               # minibatch 大小

# === 训练 ===
resume: true                # true = 从 models/latest.pt 继续训练
num_updates: 500             # 总更新次数（总步数 ≈ 100万）
print_every: 10
num_seeds: 1
render: true                 # 训练后弹窗演示并保存 GIF
solved_threshold: 200        # gymnasium 标准：连续100集均值 ≥ 200
